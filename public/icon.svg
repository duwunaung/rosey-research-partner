<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Background for maskable icon requirements -->
  <rect width="512" height="512" rx="72" fill="#050508"/>
  
  <!-- Outer glowing shield -->
  <path d="M256,60 L400,120 L400,280 C400,380 256,450 256,450 C256,450 112,380 112,280 L112,120 L256,60 Z" 
        fill="none" 
        stroke="url(#gradient)" 
        stroke-width="18" 
        stroke-linejoin="round"
        filter="url(#glow)"/>
        
  <!-- Inner robotic brain / node icon -->
  <g transform="translate(196, 176)">
    <!-- Node connections -->
    <path d="M60,30 L60,110 M20,70 L100,70" stroke="#818cf8" stroke-width="8" stroke-linecap="round"/>
    <circle cx="60" cy="30" r="14" fill="#06b6d4" stroke="#050508" stroke-width="4"/>
    <circle cx="20" cy="70" r="14" fill="#6366f1" stroke="#050508" stroke-width="4"/>
    <circle cx="100" cy="70" r="14" fill="#a855f7" stroke="#050508" stroke-width="4"/>
    <circle cx="60" cy="110" r="14" fill="#38bdf8" stroke="#050508" stroke-width="4"/>
    <circle cx="60" cy="70" r="18" fill="#ffffff" stroke="#6366f1" stroke-width="6"/>
  </g>

  <!-- Definitions for gradients and filters -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="50%" stop-color="#a855f7"/>
      <stop offset="100%" stop-color="#06b6d4"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
</svg>
